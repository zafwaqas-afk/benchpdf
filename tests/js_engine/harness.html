<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>JS engine harness</title></head>
<body>
<!--
  Suite harness for the browser PDF->PPTX engine. Loads THE SITE'S engine
  (assets/js/engine/engine.js) against the real vendored libraries at the
  real versions, so what the suite measures is what would actually ship.
  tests/engines.py serves the site directory alongside this file and calls
  window.convertToPptx().
-->
<script src="/assets/vendor/jszip.min.js"></script>
<script src="/assets/vendor/pptxgen.min.js"></script>
<script src="/assets/vendor/pdf-lib.min.js"></script>
<script type="module">
  import * as pdfjs from "/assets/vendor/pdfjs/pdf.min.mjs";
  import { convertPdfToPptx } from "/assets/js/engine/engine.js";

  pdfjs.GlobalWorkerOptions.workerSrc = "/assets/vendor/pdfjs/pdf.worker.min.mjs";

  const convert = async (bytes, opts) => {
    const buf = new Uint8Array(bytes).buffer;
    const { blob, report } = await convertPdfToPptx(buf, {
      pdfjs, PptxGenJS: window.PptxGenJS, PDFLib: window.PDFLib, JSZip: window.JSZip,
    }, () => {}, opts || {});
    const out = new Uint8Array(await blob.arrayBuffer());
    let s = "";
    const CHUNK = 0x8000;
    for (let i = 0; i < out.length; i += CHUNK) {
      s += String.fromCharCode.apply(null, out.subarray(i, i + CHUNK));
    }
    return { pptx: btoa(s), report };
  };
  window.convertToPptx = async (bytes, opts) => (await convert(bytes, opts)).pptx;
  // the engine's own per-page report (mode, confidence breakdown, notes),
  // for suite checks that assert on WHY a page shipped the way it did
  window.convertToPptxWithReport = convert;
  window.harnessReady = true;
</script>
</body>
</html>
